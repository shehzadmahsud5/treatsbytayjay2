      <h1>Privacy Policy</h1>
      <p><strong>Last Updated: May 2026</strong></p>
      
      <p>At Treats By Tayjah ("we", "us", "our"), we are committed to protecting your personal data and respecting your privacy. This policy explains how we collect, use, and store the information you provide to us when using our website and placing custom orders.</p>

      <h2>1. Information We Collect</h2>
      <p>When you submit an enquiry through our custom order form, we collect the following personal information:</p>
      <ul>
        <li><strong>Identity & Contact Data:</strong> Name, email address, phone number, and Instagram handle.</li>
        <li><strong>Event Data:</strong> Event date, delivery address (if applicable), and occasion details.</li>
        <li><strong>Health Data:</strong> Information regarding allergies and dietary requirements to ensure food safety.</li>
      </ul>

      <h2>2. How We Use Your Data</h2>
      <p>We use your personal data strictly for the following purposes:</p>
      <ul>
        <li>To respond to your order enquiries and communicate with you about your custom bake.</li>
        <li>To fulfill and deliver your orders safely, accommodating any stated dietary requirements.</li>
        <li>For internal record keeping and accounting as required by UK law.</li>
      </ul>
      <p><strong>We will never sell, distribute, or lease your personal information to third parties.</strong></p>

      <h2>3. Data Storage & Security</h2>
      <p>We are committed to ensuring that your information is secure. We use secure email providers and form handlers to process your enquiries. We keep your data only for as long as necessary to fulfill your order and satisfy any legal or accounting requirements.</p>

      <h2>4. Your Rights (GDPR)</h2>
      <p>Under the UK General Data Protection Regulation (UK GDPR), you have the right to:</p>
      <ul>
        <li>Request a copy of the personal data we hold about you.</li>
        <li>Request that we correct any inaccurate or incomplete data.</li>
        <li>Request that we delete your personal data (the "right to be forgotten").</li>
      </ul>

      <h2>5. Contact Us</h2>
      <p>If you have any questions about this Privacy Policy or wish to exercise your data rights, please contact us via direct message on our Instagram page: <a href="https://www.instagram.com/treatsbytayjah" target="_blank" rel="noopener noreferrer">@treatsbytayjah</a>.</p>
